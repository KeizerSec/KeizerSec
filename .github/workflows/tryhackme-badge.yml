name: Update TryHackMe Badge

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: thm-badge
  cancel-in-progress: false

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate badge SVG
        env:
          THM_USERNAME: Keizer
          OUTPUT_PATH: assets/thm_badge.svg
        run: node .github/scripts/generate-thm-badge.js

      - name: Commit and push if changed
        run: |
          git config user.name "KeizerSec"
          git config user.email "185857228+KeizerSec@users.noreply.github.com"
          git add assets/thm_badge.svg
          if git diff --staged --quiet; then
            echo "No changes to badge."
            exit 0
          fi
          git commit -m "chore: refresh TryHackMe badge stats"
          git push
