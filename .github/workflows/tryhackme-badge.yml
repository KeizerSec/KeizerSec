name: Update TryHackMe Badge

# The scheduled run was removed: TryHackMe's API is behind Vercel bot mitigation
# that challenges every GitHub-hosted (datacenter) runner IP, so this always failed
# from the cloud. The badge is now refreshed from a residential machine instead
# (see KeizerSec/Tryhackme-Badge → scripts/refresh-badges.sh + launchd). Kept for
# manual runs only.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: thm-badge
  cancel-in-progress: false

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: KeizerSec/Tryhackme-Badge@v1
        with:
          username: Keizer
          output_path: assets/thm_badge.svg
          theme: rotate
          committer_name: KeizerSec
          committer_email: 185857228+KeizerSec@users.noreply.github.com
          commit_message: "chore: refresh TryHackMe badge stats"
