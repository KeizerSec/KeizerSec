name: Update TryHackMe Badge

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: thm-badge
  cancel-in-progress: false

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: KeizerSec/Tryhackme-Badge@v1
        with:
          username: Keizer
          output_path: assets/thm_badge.svg
          theme: rotate
          committer_name: KeizerSec
          committer_email: 185857228+KeizerSec@users.noreply.github.com
          commit_message: "chore: refresh TryHackMe badge stats"
